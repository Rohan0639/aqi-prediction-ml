name: Hourly Data Auto Fetch

permissions:
  contents: write

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-all-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Data Collection Scripts
        env:
          AQI_API_KEY: ${{ secrets.AQI_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          echo "Fetching AQI data..."
          python live_data_collector.py --mode once
          
          echo "Fetching Weather data..."
          python weather_fetch.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Pull latest changes to avoid conflicts
          git pull origin main --rebase
          
          git add data/live_aqi_dataset.csv data/hyderabad_live_weather.csv
          
          # Commit only if there are changes
          git commit -m "Auto update AQI & Weather data $(date)" || echo "No changes to commit"
          
          git push origin main
