name: Daily AQI Data Fetch

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Data Collector
        env:
          AQI_API_KEY: ${{ secrets.AQI_API_KEY }}
        run: |
          echo "Running data collector..."
          python live_data_collector.py --mode once

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git pull origin main --rebase

          git add data/live_aqi_dataset.csv

          git commit -m "Auto अपडेट AQI dataset $(date)" || echo "No changes to commit"

          git push origin main