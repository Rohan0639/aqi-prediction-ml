name: Daily AQI Data Fetch

permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Run Data Collector
        env:
          AQI_API_KEY: ${{ secrets.AQI_API_KEY }}
        run: python live_data_collector.py --mode once

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/live_aqi_dataset.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update AQI dataset"
            git push
          fi
